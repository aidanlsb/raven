directories:
    daily: daily/
queries:
    active-projects:
        query: type:project .status==active
        description: Active projects
    overdue:
        query: trait:due .value==past
        description: Overdue items
    people:
        query: type:person
        description: All people
    projects:
        query: type:project
        description: All projects
    tasks:
        query: trait:due
        description: All tasks with due dates
