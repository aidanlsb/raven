# Raven Vault Configuration
# These settings control vault-level behavior.

# Directory settings
directories:
  daily: daily/
  type: type/
  page: page/
  template: templates/

# Asset settings
# Assets are non-Markdown files that Raven can reference, validate, and organize.
# Asset kinds are rules, not schema object types.
assets:
  root: assets/
  kinds:
    photo:
      extensions: [jpg, jpeg, png, gif, webp, heic]
      media_types: [image/]
      default_path: photos/
    pdf:
      extensions: [pdf]
      media_types: [application/pdf]
      default_path: pdfs/
    audio:
      extensions: [mp3, m4a, wav, flac, aac, ogg]
      media_types: [audio/]
      default_path: audio/
    video:
      extensions: [mp4, mov, m4v, webm, avi]
      media_types: [video/]
      default_path: videos/
    data:
      extensions: [csv, tsv, json, jsonl, parquet]
      default_path: data/

# Additional protected/system prefixes (additive).
# Raven mutation commands and automation features refuse to operate on protected paths.
# Critical protected paths are enforced automatically (.raven/, .trash/, .git/, raven.yaml, schema.yaml).
# protected_prefixes:
#   - templates/
#   - private/

# Unmanaged files/directories Raven should not index, check, query, or mutate.
# Patterns use .gitignore-style syntax and are evaluated relative to the vault root.
# exclude:
#   - AGENTS.md
#   - .cursor/
#   - "*.plan.md"

# Auto-reindex after CLI operations that modify files (default: true)
# When enabled, commands like 'rvn add', 'rvn new', 'rvn set', 'rvn edit'
# will automatically update the index. Disable if you prefer manual reindexing.
auto_reindex: true

# Quick capture settings for 'rvn add'
# capture:
#   destination: daily      # "daily" (default) or a file path like "inbox.md"
#   heading: "## Captured"  # Optional heading to append under

# Deletion settings for 'rvn delete'
# deletion:
#   behavior: trash         # "trash" (default) or "permanent"
#   trash_dir: .trash       # Directory for trashed files (default: .trash)

# Saved queries - run with 'rvn query <name>'
# Uses the Raven query language (same as 'rvn query "..."')
queries:
  # All items with @due trait
  tasks:
    query: "trait:due"
    description: "All tasks with due dates"

  # Overdue items
  overdue:
    query: "trait:due .value<today"
    description: "Items due before today"

  # Items due soon
  due-soon:
    query: "trait:due in(.value, [today, tomorrow])"
    description: "Items due today or tomorrow"

  # Active projects
  active-projects:
    query: "type:project has(trait:todo)"
    description: "Projects marked with @todo"
