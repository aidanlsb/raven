id: raven-keep-admin
title: Raven Keep Admin
version: 1
summary: Keep setup, selection, and global config workflows for Raven.
entry: body.md
references:
  - references/keep-lifecycle.md
coverage:
  commands:
    - init
    - path
    - keep
    - keep add
    - keep list
    - keep current
    - keep path
    - keep use
    - keep pin
    - keep remove
    - keep clear
    - config
    - config init
    - config show
    - config set
    - config unset
execution:
  preferred_transport: cli
  cli_binary: rvn
  cli_args_suffix:
    - --json
  mcp_fallback: false
