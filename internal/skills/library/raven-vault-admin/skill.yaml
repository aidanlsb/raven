id: raven-vault-admin
title: Raven Vault Admin
version: 1
summary: Vault setup, selection, and global config workflows for Raven.
entry: body.md
references:
  - references/vault-lifecycle.md
coverage:
  commands:
    - init
    - vault
    - vault add
    - vault list
    - vault current
    - vault path
    - vault stats
    - vault use
    - vault pin
    - vault remove
    - vault clear
    - config
    - config init
    - config show
    - config set
    - config unset
execution:
  preferred_transport: cli
  cli_binary: rvn
  cli_args_suffix:
    - --json
  mcp_fallback: true
