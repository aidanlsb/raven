id: raven-workflows
title: Raven Workflows
version: 1
summary: Authoring, validating, running, and maintaining Raven workflow pipelines.
entry: body.md
references:
  - references/workflow-authoring.md
coverage:
  commands:
    - workflow list
    - workflow add
    - workflow scaffold
    - workflow remove
    - workflow validate
    - workflow show
    - workflow step add
    - workflow step update
    - workflow step remove
    - workflow run
    - workflow continue
    - workflow runs list
    - workflow runs step
    - workflow runs prune
execution:
  preferred_transport: cli
  cli_binary: rvn
  cli_args_suffix:
    - --json
  mcp_fallback: true
