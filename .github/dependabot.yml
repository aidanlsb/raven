version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      charmbracelet-dependencies:
        patterns:
          - "github.com/charmbracelet/*"
          - "github.com/charmbracelet/x/*"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/charmbracelet/*"
          - "github.com/charmbracelet/x/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
